<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト給与計算</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS PWA設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="シフト計算">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

    <style>
        :root { --p: #0061a4; --s: #dfe3eb; --sec: #006a6a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: env(safe-area-inset-top) 12px 40px; background: #fdfbff; color: #1a1c1e; margin: 0; }
        
        /* iOS用説明パネル */
        .ios-guide { background: #fff9c4; padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 12px; border: 1px solid #fbc02d; line-height: 1.5; }

        .salary-card { background: var(--p); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(0,97,164,0.2); }
        .salary-val { font-size: 34px; font-weight: bold; }

        .section { background: white; padding: 16px; border-radius: 16px; border: 1px solid var(--s); margin-bottom: 12px; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--p); display: flex; align-items: center; gap: 5px; }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { padding: 12px; border-radius: 10px; border: 1px solid var(--s); font-size: 16px; width: 100%; background: #f9f9fb; }

        .time-row { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 12px; border: 1px solid var(--s); margin-bottom: 8px; transition: 0.2s; }
        .time-row.active { border: 2px solid var(--p); background: #f0f7ff; }
        .t-input { width: 80px !important; text-align: center; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 0.85; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5px; border: 1px solid var(--s); border-radius: 8px; background: white; position: relative; }
        .day.sat { color: #007aff; background: #f0f7ff; }
        .day.sun { color: #ff3b30; background: #fff0f0; }
        .day.selected { background: var(--p) !important; color: white !important; }
        
        /* カレンダー内の表示項目 */
        .day-num { font-weight: bold; font-size: 14px; }
        .day-time { font-size: 8px; margin-top: 2px; transform: scale(0.9); }
        .day-pay { font-size: 8px; color: #4caf50; font-weight: bold; }
        .selected .day-pay { color: #e1ff00; }

        .btn-main { background: var(--sec); color: white; border: none; width: 100%; padding: 18px; border-radius: 100px; font-weight: bold; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,106,106,0.2); }
    </style>
</head>
<body>

<div class="ios-guide" id="ios-info">
    <strong>📲 iPhoneでアプリ化する方法:</strong><br>
    下の「共有ボタン（□に↑）」を押し、<strong>「ホーム画面に追加」</strong>を選択してください。全画面で使えるようになります。
</div>

<div class="salary-card">
    <div id="salary-total" class="salary-val">¥0</div>
    <div id="salary-detail">0.0h (¥0 / ¥0)</div>
</div>

<div class="section">
    <h3>⚙️ 基本設定</h3>
    <div class="config-grid">
        <input type="month" id="target-month" value="2026-05" onchange="initCalendar()">
        <input type="number" id="base-wage" value="1000" placeholder="時給" onchange="calcSalary()">
    </div>
</div>

<div class="section">
    <h3>⏰ パターン選択</h3>
    <div id="preset-container"></div>
    <button style="width:100%; border:1px dashed var(--p); background:none; padding:12px; border-radius:12px; color:var(--p); font-weight:bold;" onclick="addPreset()">＋ 時間枠を追加</button>
</div>

<div class="section">
    <h3>📅 シフト入力</h3>
    <div class="grid" id="calendar"></div>
</div>

<button class="btn-main" onclick="downloadICS()">🗓 カレンダー用に出力</button>

<script>
    // iOSアプリモードならガイドを隠す
    if (window.navigator.standalone) {
        document.getElementById('ios-info').style.display = 'none';
    }

    let selectedData = {}; let activeId = 0; let pCount = 0;

    function addPreset(s="18:00", e="21:00") {
        const id = pCount++;
        const row = document.createElement('div');
        row.className = 'time-row'; row.id = `p-${id}`;
        row.onclick = (ev) => { if(ev.target.tagName !== 'INPUT') selectP(id); };
        row.innerHTML = `<input type="radio" name="pr" id="r-${id}"> <input type="text" id="s-${id}" class="t-input" value="${s}"> 〜 <input type="text" id="e-${id}" class="t-input" value="${e}">`;
        document.getElementById('preset-container').appendChild(row);
        if(id===0) selectP(0);
    }

    function selectP(id) {
        activeId = id;
        document.querySelectorAll('.time-row').forEach(r => r.classList.remove('active'));
        document.getElementById(`p-${id}`).classList.add('active');
        document.getElementById(`r-${id}`).checked = true;
    }

    function initCalendar() {
        const cal = document.getElementById('calendar'); cal.innerHTML = ''; selectedData = {};
        const [y, m] = document.getElementById('target-month').value.split('-');
        const last = new Date(y, m, 0).getDate();
        for (let i = 1; i <= last; i++) {
            const date = new Date(y, m-1, i); const day = date.getDay(); const key = y+m+i.toString().padStart(2,'0');
            const div = document.createElement('div');
            div.className = 'day' + (day===0?' sun':day===6?' sat':'');
            div.innerHTML = `<div class="day-num">${i}</div><div class="day-time" id="t-${key}"></div><div class="day-pay" id="y-${key}"></div>`;
            div.onclick = () => {
                if(selectedData[key]) { 
                    delete selectedData[key]; div.classList.remove('selected'); 
                    document.getElementById('t-'+key).innerText=''; document.getElementById('y-'+key).innerText='';
                } else { 
                    const s = document.getElementById(`s-${activeId}`).value;
                    const e = document.getElementById(`e-${activeId}`).value;
                    selectedData[key] = {start:s, end:e};
                    div.classList.add('selected');
                    updateDayInfo(key);
                }
                calcSalary();
            };
            cal.appendChild(div);
        }
        calcSalary();
    }

    function updateDayInfo(key) {
        const d = selectedData[key];
        const [sH, sM] = d.start.split(':').map(Number);
        const [eH, eM] = d.end.split(':').map(Number);
        let h = (eH + eM/60) - (sH + sM/60); if(h<0) h+=24;
        const wage = parseInt(document.getElementById('base-wage').value)||0;
        document.getElementById('t-'+key).innerText = d.start;
        document.getElementById('y-'+key).innerText = '¥' + Math.round(h * wage);
    }

    function calcSalary() {
        const base = parseInt(document.getElementById('base-wage').value)||0;
        let total = 0, hrs = 0;
        Object.keys(selectedData).forEach(key => {
            const d = selectedData[key];
            const [sH, sM] = d.start.split(':').map(Number);
            const [eH, eM] = d.end.split(':').map(Number);
            let h = (eH + eM/60) - (sH + sM/60); if(h<0) h+=24;
            total += h * base; hrs += h;
            document.getElementById('y-'+key).innerText = '¥' + Math.round(h * base);
        });
        document.getElementById('salary-total').innerText = `¥${Math.round(total).toLocaleString()}`;
        document.getElementById('salary-detail').innerText = `${hrs.toFixed(1)}h (基本 ¥${base})`;
    }

    function downloadICS() {
        const keys = Object.keys(selectedData).sort();
        if(!keys.length) return;
        let ics = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//SalaryShift//JP"];
        keys.forEach(k => {
            const s = selectedData[k];
            ics.push("BEGIN:VEVENT",`DTSTART:${k}T${s.start.replace(':','')}00`,`DTEND:${k}T${s.end.replace(':','')}00`,"SUMMARY:バイト","END:VEVENT");
        });
        ics.push("END:VCALENDAR");
        const a = document.createElement("a");
        a.href=URL.createObjectURL(new Blob([ics.join("\r\n")],{type:"text/calendar"}));
        a.download="shift.ics"; a.click();
    }

    addPreset(); addPreset("09:00","15:00"); initCalendar();
</script>
</body>
</html>
