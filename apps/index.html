<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト給与計算</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA / iOS設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

    <style>
        :root { --p: #0061a4; --s: #dfe3eb; --sec: #006a6a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; padding: env(safe-area-inset-top) 12px 40px; background: #fdfbff; color: #1a1c1e; margin: 0; overflow-x: hidden; }
        
        /* iOS追加説明パネル */
        #ios-guide { 
            background: #fff9c4; padding: 15px; border-radius: 16px; 
            font-size: 13px; margin-bottom: 15px; border: 1px solid #fbc02d; 
            line-height: 1.6; display: none; /* JSで制御 */
        }

        .salary-card { background: var(--p); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .salary-val { font-size: 32px; font-weight: bold; }
        .salary-sub { font-size: 11px; opacity: 0.9; margin-top: 5px; }

        .section { background: white; padding: 16px; border-radius: 16px; border: 1px solid var(--s); margin-bottom: 12px; }
        h3 { margin: 0 0 12px 0; font-size: 14px; color: var(--p); border-left: 4px solid var(--p); padding-left: 8px; }

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-item { display: flex; flex-direction: column; gap: 4px; }
        .input-item label { font-size: 10px; font-weight: bold; color: #666; }
        input { padding: 12px; border-radius: 10px; border: 1px solid var(--s); font-size: 16px; width: 100%; background: #f9f9fb; }

        .time-row { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 12px; border: 1px solid var(--s); margin-bottom: 8px; }
        .time-row.active { border: 2px solid var(--p); background: #f0f7ff; }
        .t-input { width: 80px !important; text-align: center; font-weight: bold; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; width: 100%; }
        .day { aspect-ratio: 0.8; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 6px; border: 1px solid var(--s); border-radius: 8px; background: white; }
        .day.sat { color: #007aff; background: #f0f7ff; }
        .day.sun { color: #ff3b30; background: #fff0f0; }
        .day.selected { background: var(--p) !important; color: white !important; }
        
        .day-num { font-weight: bold; font-size: 14px; }
        .day-pay { font-size: 9px; color: #4caf50; font-weight: bold; margin-top: auto; padding-bottom: 4px; }
        .selected .day-pay { color: #e1ff00; }

        .btn-main { background: var(--sec); color: white; border: none; width: 100%; padding: 18px; border-radius: 100px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<!-- iOS用ガイドパネル -->
<div id="ios-guide">
    <strong>【iPhoneの方へ】</strong><br>
    このツールをアプリとして追加するには、Safariの下にある<strong>共有ボタン（□に↑）</strong>を押して、<strong>「ホーム画面に追加」</strong>を選択してください。
</div>

<div class="salary-card">
    <div id="salary-total" class="salary-val">¥0</div>
    <div id="salary-detail" class="salary-sub">合計 0.0h (平日 0h / 土日 0h)</div>
</div>

<div class="section">
    <h3>⚙️ 基本設定</h3>
    <div class="config-grid">
        <div class="input-item"><label>対象月</label><input type="month" id="target-month" value="2026-05" onchange="initCalendar()"></div>
        <div class="input-item"><label>平日時給</label><input type="number" id="base-wage" value="1000" onchange="calcSalary()"></div>
        <div class="input-item" style="grid-column: span 2;"><label>土日加算（＋円）</label><input type="number" id="weekend-up" value="100" onchange="calcSalary()"></div>
    </div>
</div>

<div class="section">
    <h3>⏰ シフトパターン</h3>
    <div id="preset-container"></div>
    <button style="width:100%; border:1px dashed var(--p); background:none; padding:12px; border-radius:12px; color:var(--p); font-weight:bold;" onclick="addPreset()">＋ 枠を追加</button>
</div>

<div class="section">
    <div class="grid" id="calendar"></div>
</div>

<button class="btn-main" onclick="downloadICS()">カレンダー形式で出力</button>

<script>
    // iOSかつブラウザ（非アプリモード）の場合のみガイドを表示
    const isIos = /iPhone|iPad|iPod/.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    if (isIos && !isStandalone) {
        document.getElementById('ios-guide').style.display = 'block';
    }

    let selectedData = {}; let activeId = 0; let pCount = 0;

    function addPreset(s="18:00", e="21:00") {
        const id = pCount++;
        const row = document.createElement('div');
        row.className = 'time-row'; row.id = `p-${id}`;
        row.onclick = (ev) => { if(ev.target.tagName !== 'INPUT') selectP(id); };
        row.innerHTML = `<input type="radio" name="pr" id="r-${id}"> <input type="text" id="s-${id}" class="t-input" value="${s}" onchange="calcSalary()"> 〜 <input type="text" id="e-${id}" class="t-input" value="${e}" onchange="calcSalary()">`;
        document.getElementById('preset-container').appendChild(row);
        if(id===0) selectP(0);
    }

    function selectP(id) {
        activeId = id;
        document.querySelectorAll('.time-row').forEach(r => r.classList.remove('active'));
        document.getElementById(`p-${id}`).classList.add('active');
        document.getElementById(`r-${id}`).checked = true;
    }

    function initCalendar() {
        const cal = document.getElementById('calendar'); cal.innerHTML = ''; selectedData = {};
        const [y, m] = document.getElementById('target-month').value.split('-');
        const last = new Date(y, m, 0).getDate();
        for (let i = 1; i <= last; i++) {
            const date = new Date(y, m-1, i); const day = date.getDay(); const key = y+m+i.toString().padStart(2,'0');
            const div = document.createElement('div');
            div.className = 'day' + (day===0?' sun':day===6?' sat':'');
            div.innerHTML = `<div class="day-num">${i}</div><div class="day-pay" id="y-${key}"></div>`;
            div.onclick = () => {
                if(selectedData[key]) { 
                    delete selectedData[key]; div.classList.remove('selected'); document.getElementById('y-'+key).innerText='';
                } else { 
                    const s = document.getElementById(`s-${activeId}`).value;
                    const e = document.getElementById(`e-${activeId}`).value;
                    selectedData[key] = {start:s, end:e, isWeekend: (day===0 || day===6)};
                    div.classList.add('selected');
                }
                calcSalary();
            };
            cal.appendChild(div);
        }
        calcSalary();
    }

    function calcSalary() {
        const base = parseInt(document.getElementById('base-wage').value)||0;
        const up = parseInt(document.getElementById('weekend-up').value)||0;
        let total = 0, hWk = 0, hWe = 0;

        Object.keys(selectedData).forEach(key => {
            const d = selectedData[key];
            const [sH, sM] = d.start.split(':').map(Number);
            const [eH, eM] = d.end.split(':').map(Number);
            let h = (eH + eM/60) - (sH + sM/60); if(h<0) h+=24;
            
            const dayWage = h * (d.isWeekend ? (base + up) : base);
            total += dayWage;
            if(d.isWeekend) hWe += h; else hWk += h;
            
            const payEl = document.getElementById('y-'+key);
            if(payEl) payEl.innerText = '¥' + Math.round(dayWage);
        });

        document.getElementById('salary-total').innerText = `¥${Math.round(total).toLocaleString()}`;
        document.getElementById('salary-detail').innerText = `合計 ${(hWk+hWe).toFixed(1)}h (平日 ${hWk.toFixed(1)}h / 土日 ${hWe.toFixed(1)}h)`;
    }

    function downloadICS() {
        const keys = Object.keys(selectedData).sort();
        if(!keys.length) return;
        let ics = ["BEGIN:VCALENDAR","VERSION:2.0"];
        keys.forEach(k => {
            const s = selectedData[k];
            ics.push("BEGIN:VEVENT",`DTSTART:${k}T${s.start.replace(':','')}00`,`DTEND:${k}T${s.end.replace(':','')}00`,"SUMMARY:バイト","END:VEVENT");
        });
        ics.push("END:VCALENDAR");
        const a = document.createElement("a"); a.href=URL.createObjectURL(new Blob([ics.join("\r\n")],{type:"text/calendar"})); a.download="shift.ics"; a.click();
    }

    addPreset(); addPreset("09:00","15:00"); initCalendar();
</script>
</body>
</html>
